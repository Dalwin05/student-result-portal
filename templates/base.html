<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Result Portal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #1a202c; }
    header {
      background: linear-gradient(135deg, #1e3a5f, #2b6cb0);
      color: white; padding: 1.2rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    header h1 { font-size: 1.4rem; font-weight: 600; }
    header p  { font-size: 0.8rem; opacity: 0.8; margin-top: 2px; }
    .badge { background: #63b3ed; color: #1a365d; font-size: 0.7rem;
             padding: 2px 8px; border-radius: 12px; font-weight: 600; }
    main { max-width: 1100px; margin: 0 auto; padding: 2rem 1rem; }
    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>
  <header>
    <div>
      <h1>🎓 Student Result Portal</h1>
      <p>Subject Code: 24CS2018 – DevOps Project | Semester VII CSE</p>
    </div>
    <span class="badge">LIVE on AKS</span>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
