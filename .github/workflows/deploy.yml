name: CI/CD – Student Result Portal

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ACR_NAME:        ${{ secrets.ACR_NAME }}            # e.g. studentportalacr
  RESOURCE_GROUP:  ${{ secrets.AZURE_RESOURCE_GROUP }}
  AKS_CLUSTER:     ${{ secrets.AKS_CLUSTER_NAME }}
  IMAGE_NAME:      student-result-portal

jobs:
  # ── Job 1: Run Tests ────────────────────────────────────────────
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest tests/ -v


  # ── Job 2: Build & Push Docker Image ────────────────────────────
  build-and-push:
    name: Build Docker Image & Push to ACR
    runs-on: ubuntu-latest
    needs: test          # only runs if tests pass
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      

      - name: Log in to ACR
        run: az acr login --name $ACR_NAME

      - name: Build and push Docker image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t $ACR_NAME.azurecr.io/$IMAGE_NAME:$IMAGE_TAG .
          docker build -t $ACR_NAME.azurecr.io/$IMAGE_NAME:latest .
          docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:$IMAGE_TAG
          docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:latest
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV


  # ── Job 3: Deploy to AKS via Ansible ────────────────────────────
  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
         
      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group $RESOURCE_GROUP \
            --name $AKS_CLUSTER \
            --overwrite-existing

      - name: Install Ansible + Kubernetes collection
        run: |
          pip install ansible kubernetes
          ansible-galaxy collection install community.kubernetes

      - name: Run Ansible deployment playbook
        env:
          ACR_NAME: ${{ secrets.ACR_NAME }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          ansible-playbook ansible/deploy-playbook.yml \
            -e "image_tag=$IMAGE_TAG" \
            -e "acr_name=$ACR_NAME"

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/student-portal --timeout=120s
          kubectl get pods -l app=student-portal
          kubectl get svc student-portal-service
